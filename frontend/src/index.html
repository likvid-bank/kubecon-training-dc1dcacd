<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>meshi's Escape</title>
  <style>
    :root {
      --bg1: #f6fbff;
      --bg2: #eaf7ef;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #6b7280;
      --ok-bg: #e8f7ec;
      --ok-border: #9ad9ac;
      --ok-text: #166534;
      --bad-bg: #fdecec;
      --bad-border: #f5c2c7;
      --bad-text: #842029;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(6px);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .header {
      padding: 26px 28px 12px;
      background: linear-gradient(120deg, #eef6ff, #effaf2);
      border-bottom: 1px solid #e5e7eb;
    }

    .header-image {
      display: block;
      width: min(100%, 760px);
      height: auto;
      margin: 0 auto;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .content {
      padding: 22px 28px 30px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .story {
      line-height: 1.55;
      color: #243246;
    }

    .chase {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      font-size: 2.2rem;
      padding: 10px 4px;
      min-height: 86px;
    }

    .chase.caught {
      gap: 6px;
    }

    .meshi {
      width: 84px;
      height: 84px;
      object-fit: contain;
    }

    .grasses {
      display: flex;
      gap: 4px;
      font-size: 2.1rem;
      letter-spacing: -2px;
      min-width: 174px;
    }

    .grass {
      width: 90px;
      height: 90px;
      object-fit: contain;
      display: block;
    }

    .grasses.close {
      min-width: 34px;
      gap: 0;
    }

    .grasses.none {
      min-width: 0;
      gap: 0;
    }

    .grass.gone {
      opacity: 0.22;
      filter: grayscale(100%);
    }

    .wolf {
      width: 110px;
      height: 110px;
      object-fit: contain;
      margin-left: 6px;
    }

    .chase.caught .wolf {
      width: 215px;
      height: 215px;
    }

    .edu-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 10px;
      align-items: start;
    }

    .edu-card {
      border: 1px solid #dbe4ea;
      border-radius: 12px;
      padding: 12px;
      background: #fcfdff;
    }

    .edu-person {
      width: 100%;
      max-width: 220px;
      display: block;
      margin: 0 auto 10px;
    }

    .bubble {
      background: #f7fafc;
      border: 1px solid #d9e2ec;
      border-radius: 12px;
      padding: 10px 12px;
      line-height: 1.45;
    }

    .bubble ul {
      margin: 0;
      padding-left: 20px;
    }

    .bubble li {
      margin-bottom: 8px;
    }

    .bubble li:last-child {
      margin-bottom: 0;
    }

    .badge {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f2f4f7;
      color: #374151;
      font-size: 0.78rem;
      font-weight: 600;
      vertical-align: middle;
    }

    .message {
      border-radius: 10px;
      padding: 12px 14px;
      font-weight: 600;
      border: 1px solid;
      display: none;
    }

    .message.ok {
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: var(--ok-text);
    }

    .message.bad {
      background: var(--bad-bg);
      border-color: var(--bad-border);
      color: var(--bad-text);
    }

    .question {
      font-size: 1.1rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .option {
      display: flex;
      gap: 10px;
      align-items: center;
      border: 1px solid #dbe1e7;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: 0.15s ease;
      background: #fff;
    }

    .option:hover { border-color: #9aa7b5; }

    .option input { margin: 0; }

    textarea {
      width: 100%;
      resize: vertical;
      min-height: 110px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 11px;
      font: inherit;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #334155;
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .footer-note {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
    }

    @media (max-width: 700px) {
      .content { padding: 16px; }
      .header { padding: 18px 16px 10px; }
      .meshi { width: 64px; height: 64px; }
      .chase { font-size: 1.8rem; gap: 8px; }
      .grasses { font-size: 1.7rem; min-width: 130px; }
      .wolf { width: 85px; height: 85px; }
      .edu-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <img class="header-image" src="header.png" alt="meshi's Escape" />
    </header>

    <section class="content">
      <div id="message" class="message"></div>

      <div class="panel">
        <div id="chase" class="chase"></div>
      </div>

      <div id="screen" class="panel"></div>
    </section>
  </main>

  <script>
    const MAX_PITCH_WRONG = 2;

    const icpQuestions = [
      {
        question: "What is the minimum company size for our Ideal Customer Profile?",
        options: ["500 employees", "1,000 employees", "5,000 employees", "10,000 employees"],
        correct: 1,
      },
      {
        question: "Which of these is a key persona we target?",
        options: ["Junior Frontend Developers", "Platform Engineers", "CTOs", "Analysts"],
        correct: 1,
      },
      {
        question: "What technical environment are our ideal customers typically in?",
        options: ["Docker only", "Kubernetes & cloud-native", "VM-based infrastructure", "Serverless only"],
        correct: 1,
      },
    ];

    const pitchQuestions = [
      {
        question: "Why do developers love meshStack?",
        options: [
          "True Self-Service via UI/API/Terraform",
          "Weekly release windows for platform requests",
          "Manual ticketing for every cloud change",
          "One-click access only for admins",
          "Fixed templates with no API support",
        ],
        correct: 0,
      },
      {
        question: "How do platform engineers manage the platform?",
        options: [
          "They can do everything as code",
          "They have to learn a new configuration language",
          "They can only use one cloud provider",
          "They must configure each project manually in the UI",
          "They need weekly vendor support for routine changes",
        ],
        correct: 0,
      },
      {
        question: "How do organizations achieve more sovereignty through meshStack?",
        options: [
          "Sovereignty through choice, not restraint",
          "Sovereignty by only offering European cloud providers",
          "Sovereignty by blocking all public cloud usage",
          "Sovereignty by enforcing one internal platform only",
          "Sovereignty by removing provider-level controls",
        ],
        correct: 0,
      },
      {
        question: "Which of the following are key values of meshStack? (Choose all correct answers)",
        options: [
          "meshStack is a Sovereign IDP.",
          "Developers get true Self-Service via UI/API/Terraform.",
          "Platform engineers can run the platform entirely as code with a modular architecture and swap components without breaking developer experience.",
          "Sovereignty is achieved through choice across clouds (e.g. Azure and STACKIT), not restraint.",
          "Developers must open manual tickets for every platform request.",
          "Platform engineers need to learn a proprietary new configuration language.",
          "Sovereignty means locking all workloads to one cloud provider.",
          "meshStack is a Cloud Governance Platform.",
          "Golden Paths work only for Kubernetes and cannot span different cloud platforms.",
          "Self-service is limited to UI only and excludes API/Terraform.",
        ],
        correct: [0, 1, 2, 3],
        multi: true,
      },
    ];

    const state = {
      stage: "start",
      wrongCount: 0,
      icpIndex: 0,
      pitchIndex: 0,
      pitchWrongCount: 0,
      loseReason: "",
      message: "",
      messageType: "ok",
    };

    const messageEl = document.getElementById("message");
    const chaseEl = document.getElementById("chase");
    const screenEl = document.getElementById("screen");

    function setMessage(text, type = "ok") {
      state.message = text;
      state.messageType = type;
      renderMessage();
    }

    function clearMessage() {
      state.message = "";
      renderMessage();
    }

    function renderMessage() {
      if (!state.message) {
        messageEl.style.display = "none";
        messageEl.textContent = "";
        messageEl.className = "message";
        return;
      }

      messageEl.style.display = "block";
      messageEl.textContent = state.message;
      messageEl.className = `message ${state.messageType}`;
    }

    function shuffleOptions(options) {
      const indexedOptions = options.map((text, originalIndex) => ({ text, originalIndex }));
      for (let i = indexedOptions.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexedOptions[i], indexedOptions[j]] = [indexedOptions[j], indexedOptions[i]];
      }
      return indexedOptions;
    }

    function renderChaseBar() {
      let visibleGrass = 0;

      if (state.stage === "lose") {
        visibleGrass = 0;
      } else if (state.stage === "Pitch") {
        visibleGrass = Math.max(0, MAX_PITCH_WRONG - state.pitchWrongCount);
      } else if (state.stage === "win") {
        visibleGrass = 2;
      } else if (state.stage === "start" || state.stage === "icp") {
        visibleGrass = 1;
      } else {
        visibleGrass = 1;
      }

      const grasses = Array.from({ length: visibleGrass }, () => "<img class=\"grass\" src=\"grass.png\" alt=\"grass\" />").join("");
      const grassesClass = visibleGrass === 0 ? "grasses none" : (visibleGrass <= 1 ? "grasses close" : "grasses");
      chaseEl.className = state.stage === "lose" ? "chase caught" : "chase";

      chaseEl.innerHTML = `
        <img class="wolf" src="wolf.png" alt="wolf" />
        <div class="${grassesClass}" aria-label="distance to wolf">${grasses}</div>
        <img class="meshi" src="sheep.png" alt="sheep" />
      `;
    }

    function submitIcpAnswer() {
      const checked = document.querySelector('input[name="icp-option"]:checked');
      if (!checked) {
        setMessage("Please pick an answer first.", "bad");
        return;
      }

      const selected = Number(checked.value);
      const question = icpQuestions[state.icpIndex];

      if (selected === question.correct) {
        setMessage("✅ Correct! meshi keeps running...", "ok");
        state.icpIndex += 1;

        if (state.icpIndex >= icpQuestions.length) {
          state.stage = "Pitch";
        }
      } else {
        state.wrongCount += 1;
        state.loseReason = "icp";
        state.stage = "lose";
        setMessage("❌ Wrong! The wolf caught meshi.", "bad");
      }

      render();
    }

    function submitPitchAnswer() {
      const checked = Array.from(document.querySelectorAll('input[name="pitch-option"]:checked'));
      if (checked.length === 0) {
        setMessage("Please pick an answer first.", "bad");
        return;
      }

      const selected = checked
        .map((input) => Number(input.value))
        .sort((a, b) => a - b);
      const question = pitchQuestions[state.pitchIndex];
      const expected = Array.isArray(question.correct)
        ? [...question.correct].sort((a, b) => a - b)
        : [question.correct];

      const isCorrect = selected.length === expected.length
        && selected.every((value, index) => value === expected[index]);

      if (isCorrect) {
        state.pitchIndex += 1;
        if (state.pitchIndex >= pitchQuestions.length) {
          setMessage("✅ Great! You nailed the core pitch aspects.", "ok");
          state.stage = "win";
        } else {
          setMessage("✅ Correct! Next key aspect.", "ok");
        }
      } else {
        state.pitchWrongCount += 1;
        if (state.pitchWrongCount >= MAX_PITCH_WRONG) {
          state.loseReason = "Pitch";
          state.stage = "lose";
          setMessage("❌ Too many wrong answers. The wolf caught meshi.", "bad");
        } else {
          setMessage("❌ Not quite. Try again.", "bad");
        }
      }

      render();
    }

    function resetGame() {
      state.stage = "start";
      state.wrongCount = 0;
      state.icpIndex = 0;
      state.pitchIndex = 0;
      state.pitchWrongCount = 0;
      state.loseReason = "";
      clearMessage();
      render();
    }

    function startGame() {
      state.stage = "icp";
      clearMessage();
      render();
    }

    function renderStartScreen() {
      screenEl.innerHTML = `
        <h2>The Chase Begins <span class="badge">Story Intro</span></h2>
        <div class="story">
          <p>meshi the sheep is being chased by a wolf and needs to reach safe pastures.</p>
          <p>To gain some distance, answer <strong>3 ICP questions</strong> correctly.</p>
          <p><strong>One wrong answer in the ICP gate and the wolf eats meshi.</strong></p>
        </div>
        <div class="actions">
          <button id="startBtn">🏃 Start the Escape</button>
        </div>
      `;

      document.getElementById("startBtn").addEventListener("click", startGame);
    }

    function renderIcpScreen() {
      const question = icpQuestions[state.icpIndex];
      const shuffledOptions = shuffleOptions(question.options);
      const optionsHtml = shuffledOptions
        .map((option) => `
          <label class="option">
            <input type="radio" name="icp-option" value="${option.originalIndex}" />
            <span>${option.text}</span>
          </label>
        `)
        .join("");

      screenEl.innerHTML = `
        <h2>ICP Knowledge Gate <span class="badge">Question ${state.icpIndex + 1}/3</span></h2>
        <div class="question">${question.question}</div>
        <div class="options">${optionsHtml}</div>
        <div class="actions">
          <button id="submitIcp">✓ Submit Answer</button>
        </div>
        <div class="hint">One wrong answer in ICP = game over.</div>
      `;

      document.getElementById("submitIcp").addEventListener("click", submitIcpAnswer);
    }

    function renderEducationScreen() {
      const question = pitchQuestions[state.pitchIndex];
      const shuffledOptions = shuffleOptions(question.options);
      const inputType = question.multi ? "checkbox" : "radio";
      const optionsHtml = shuffledOptions
        .map((option) => `
          <label class="option">
            <input type="${inputType}" name="pitch-option" value="${option.originalIndex}" />
            <span>${option.text}</span>
          </label>
        `)
        .join("");

      screenEl.innerHTML = `
        <h2>10 Second Pitch <span class="badge">Pitch</span></h2>
        <div class="story">
          <p>Great work on our ICP. Now let's get to the pitch.</p>
        </div>

        <h3>Question ${state.pitchIndex + 1}/${pitchQuestions.length}</h3>
        <div class="question">${question.question}</div>
        <div class="options">${optionsHtml}</div>

        <div class="actions">
          <button id="submitPitchFromEducation">✓ Submit Answer</button>
        </div>
        <div class="hint">${question.multi ? "Choose all correct answers." : "Choose one answer."} You can get ${MAX_PITCH_WRONG} answers wrong in this stage before the wolf catches meshi.</div>
      `;

      document.getElementById("submitPitchFromEducation").addEventListener("click", submitPitchAnswer);
    }

    function renderWinScreen() {
      screenEl.innerHTML = `
        <h2>🎉 meshi Escaped! <span class="badge">Victory</span></h2>
        <div class="story">
          <p>You got meshi safely to the pastures.</p>
          <p>You passed the ICP gate and learned the 10 second pitch.</p>
        </div>
        <div class="actions">
          <button id="playAgain">🔄 Play Again</button>
        </div>
      `;

      document.getElementById("playAgain").addEventListener("click", resetGame);
    }

    function renderLoseScreen() {
      const loseDetail = state.loseReason === "Pitch"
        ? "You reached 2 wrong answers in the Pitch stage."
        : "A wrong answer in the ICP gate let the wolf reach meshi.";

      screenEl.innerHTML = `
        <h2>💔 The Wolf Caught meshi <span class="badge">Game Over</span></h2>
        <div class="story">
          <p>${loseDetail}</p>
          <p>Try again and keep more grass between meshi and the wolf.</p>
        </div>
        <div class="actions">
          <button id="tryAgain">🔄 Try Again</button>
        </div>
      `;

      document.getElementById("tryAgain").addEventListener("click", resetGame);
    }

    function render() {
      renderMessage();
      renderChaseBar();

      switch (state.stage) {
        case "start":
          renderStartScreen();
          break;
        case "icp":
          renderIcpScreen();
          break;
        case "Pitch":
          renderEducationScreen();
          break;
        case "win":
          renderWinScreen();
          break;
        case "lose":
          renderLoseScreen();
          break;
        default:
          renderStartScreen();
      }
    }

    render();
  </script>
</body>
</html>
